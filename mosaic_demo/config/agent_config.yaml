# Demo Agent 配置
# 可选 type: "midea_claude" | "minimax"
model_provider:
  type: "minimax"
  config:
    model: "MiniMax-M2.5"
    api_base: "https://api.minimaxi.com/anthropic"
    temperature: 1.0
    max_tokens: 4096
    timeout: 60
    enable_thinking: false
    thinking_budget: 8000

# Capability 加载列表
capabilities:
  - name: "navigation"
    class: "capabilities.mock_navigation.MockNavigationCapability"
    enabled: true
  - name: "motion"
    class: "capabilities.mock_motion.MockMotionCapability"
    enabled: true

# 重试策略
retry:
  max_retries: 3
  backoff_base: 2

# 日志
logging:
  level: "INFO"
